<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bãi Xe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../static/smart_parking.css">
</head>

<body>
    <div class="app-container">
        <header class="top-header">
            <nav class="top-nav">
                <ul>
                    <li class="dropdown-container">
                        <a href="#" id="menu-he-thong">Hệ thống</a>
                        <ul class="dropdown-menu" id="dropdown-he-thong">
                            <li onclick="window.location.href='login.html'" style="cursor:pointer;">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                                <span>Đăng Xuất</span>
                            </li>
                            <li>
                                <i class="fa-solid fa-lock"></i>
                                <span>Đổi Mật Khẩu</span>
                            </li>
                        </ul>
                    </li>
                    <li class="dropdown-container">
                        <a href="#" id="menu-quan-ly">Quản Lý</a>
                        <ul class="dropdown-menu" id="dropdown-quan-ly">
                            <li onclick="window.location.href='employee.html'" style="cursor:pointer;">
                                <i class="fa-solid fa-user"></i>
                                <span>Nhân Viên</span>
                            </li>
                            <li onclick="window.location.href='pricing.html'" style="cursor:pointer;">
                                <i class="fa-solid fa-file-pen"></i>
                                <span>Cấu hình quản lý</span>
                            </li>
                        </ul>
                    </li>
                    <li class="dropdown-container">
                        <a href="#" id="menu-thong-ke">Thống Kê</a>
                        <ul class="dropdown-menu" id="dropdown-thong-ke">
                            <li onclick="window.location.href='report.html'" style="cursor:pointer;">
                                <i class="fa-solid fa-money-bill-transfer"></i>
                                <span>Doanh thu</span>
                            </li>
                            <li onclick="window.location.href='report.html'" style="cursor:pointer;">
                                <i class="fa-solid fa-chart-column"></i>
                                <span>Thống kê xe</span>
                            </li>
                        </ul>
                    </li>
                    <li><a href="help.html">Trợ Giúp</a></li>
                </ul>
            </nav>
            <div class="clock" id="clock">--:--:--</div>
        </header>

        <div class="main-wrapper">
            <aside class="sidebar">
                <div class="sidebar-menu">
                    <div class="menu-item" onclick="window.location.href='login.html'">
                        <i class="fa-solid fa-power-off"></i>
                        <span>Đăng xuất</span>
                    </div>
                    <div class="divider"></div>
                    <div class="menu-item" onclick="window.location.href='Dashboard.html'">
                        <i class="fa-solid fa-house"></i>
                        <span>Trang chủ</span>
                    </div>
                    <div class="divider"></div>
                    <div class="menu-item" onclick="window.location.href='report.html'">
                        <i class="fa-solid fa-chart-simple"></i>
                        <span>Thống kê</span>
                    </div>
                </div>
            </aside>
            <main class="content-area">
                <div class="wrap">
                    <div class="main">
                        <div class="left">
                            <div class="toolbar">
                                <label>Tìm kiếm:</label>
                                <input type="text" id="searchInput" placeholder="Nhập loại xe..." style="width:140px"
                                    oninput="filterTable()" />
                                <button class="btn-blue" onclick="resetFilter()">Xóa lọc</button>
                                <span style="margin-left:auto; font-size:12px; color:#000; font-weight:500;">
                                    Tổng: <span id="totalCount">4</span> loại xe
                                </span>
                            </div>
                            <div style="overflow-x:auto; max-height:420px; overflow-y:auto;">
                                <table id="vehicleTable">
                                    <thead>
                                        <tr>
                                            <th style="width:32px">STT</th>
                                            <th>Loại xe</th>
                                            <th>Giá/lượt</th>
                                            <th>Giờ vào</th>
                                            <th>Giờ ra</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tableBody"></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="right">
                            <div class="panel-title"><i class="ti ti-settings"
                                    style="font-size:14px; vertical-align:-2px; margin-right:4px"
                                    aria-hidden="true"></i>Cấu hình hệ thống</div>

                            <div class="form-row">
                                <label>Loại xe</label>
                                <select id="f_type">
                                    <option>Xe Máy</option>
                                    <option>Xe Tay Ga</option>
                                    <option>Ô tô</option>
                                    <option>Xe Đạp</option>
                                </select>
                            </div>

                            <div class="section-label">Giá tiền</div>
                            <div class="time-grid">
                                <div class="form-row">
                                    <label>Giá/lượt</label>
                                    <input type="number" id="f_price_turn" placeholder="VD: 5000" min="0" step="1000" />
                                </div>
                            </div>
                            <div class="section-label">Thời gian gửi xe</div>
                            <div class="time-grid">
                                <div class="form-row">
                                    <label>Giờ vào</label>
                                    <input type="time" id="f_time_in" value="06:00" />
                                </div>
                                <div class="form-row">
                                    <label>Giờ ra</label>
                                    <input type="time" id="f_time_out" value="22:00" />
                                </div>
                            </div>

                            <div class="form-row">
                                <label>Ghi chú</label>
                                <input type="text" id="f_note" placeholder="Ghi chú" />
                            </div>

                            <div class="action-row">
                                <button style="background: #215A88; color:#fff;" onclick="addOrUpdate()">
                                    <i class="ti ti-check" style="font-size:13px; vertical-align:-1px"
                                        aria-hidden="true"></i> Lưu
                                </button>
                                <button style="background:#215A88; color:#fff;" onclick="clearForm()">
                                    <i class="ti ti-plus" style="font-size:13px; vertical-align:-1px"
                                        aria-hidden="true"></i> Mới
                                </button>
                                <button style="background:#215A88; color:#fff;" onclick="deleteRow()">
                                    <i class="ti ti-trash" style="font-size:13px; vertical-align:-1px"
                                        aria-hidden="true"></i> Xóa
                                </button>
                            </div>

                            <div id="statusMsg"
                                style="font-size:12px; color:#27ae60; text-align:center; min-height:16px;"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../static/smart_parking.js"></script>
</body>

</html>
